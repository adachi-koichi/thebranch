<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テンプレートマーケットプレイス - THEBRANCH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1419;
            --card: #1a1f26;
            --border: #2d3139;
            --text: #e4e6eb;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --primary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .marketplace-header {
            margin-bottom: 40px;
        }

        .marketplace-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .marketplace-header p {
            font-size: 15px;
            color: var(--text-muted);
        }

        /* Controls Section */
        .controls-section {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 20px;
            margin-bottom: 32px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .controls-section {
                grid-template-columns: 1fr;
            }
        }

        /* Search Bar */
        .search-bar {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: rgba(59, 130, 246, 0.05);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            pointer-events: none;
        }

        /* Sort Dropdown */
        .sort-control {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sort-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select.sort-select {
            padding: 10px 12px;
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        select.sort-select:hover {
            border-color: var(--primary);
        }

        select.sort-select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: rgba(59, 130, 246, 0.05);
        }

        /* Category Filter Tabs */
        .category-filter {
            margin-bottom: 32px;
        }

        .category-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: block;
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .category-tab {
            padding: 8px 16px;
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .category-tab:hover {
            border-color: var(--primary);
            background-color: rgba(59, 130, 246, 0.1);
        }

        .category-tab.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Templates Grid */
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        @media (max-width: 1024px) {
            .templates-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .templates-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Template Card */
        .template-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .template-card:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.15);
            transform: translateY(-2px);
        }

        .template-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .template-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            flex: 1;
        }

        .template-category {
            display: inline-block;
            padding: 4px 10px;
            background-color: rgba(59, 130, 246, 0.15);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            color: var(--primary);
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .template-description {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            min-height: 52px;
        }

        /* Template Stats */
        .template-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stars {
            font-size: 14px;
            color: var(--warning);
        }

        .rating-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Action Button */
        .template-action {
            margin-top: auto;
        }

        .btn-template {
            width: 100%;
            padding: 10px 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-template:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Results Count */
        .results-info {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .results-info strong {
            color: var(--text);
        }

        /* Loading */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .skeleton-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
    <link rel="manifest" href="/dashboard/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="description" content="THEBRANCH - AIエージェント部署プラットフォーム">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="marketplace-header">
            <h1>テンプレートマーケットプレイス</h1>
            <p>AIエージェント部署を簡単に立ち上げられるテンプレートを探しましょう</p>
        </div>

        <!-- Controls Section -->
        <div class="controls-section">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="テンプレート名や説明で検索..."
                >
            </div>
            <div class="sort-control">
                <label class="sort-label">ソート</label>
                <select id="sortSelect" class="sort-select">
                    <option value="newest">新着順</option>
                    <option value="popular">人気順</option>
                    <option value="rating">評価順</option>
                </select>
            </div>
        </div>

        <!-- Category Filter -->
        <div class="category-filter">
            <label class="category-label">カテゴリー</label>
            <div class="category-tabs">
                <button class="category-tab active" data-category="all">すべて</button>
                <button class="category-tab" data-category="cat-001">人事</button>
                <button class="category-tab" data-category="cat-002">経理</button>
                <button class="category-tab" data-category="cat-007">法務</button>
                <button class="category-tab" data-category="cat-004">営業</button>
                <button class="category-tab" data-category="cat-003">マーケティング</button>
                <button class="category-tab" data-category="cat-005">開発</button>
            </div>
        </div>

        <!-- Results Info -->
        <div class="results-info" id="resultsInfo"></div>

        <!-- Templates Grid -->
        <div class="templates-grid" id="templatesGrid">
            <!-- Templates will be rendered here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">🔍</div>
            <h3>テンプレートが見つかりません</h3>
            <p>検索条件を変更して、もう一度お試しください</p>
        </div>
    </div>

    <script>
        // ============================================================
        // State and Constants
        // ============================================================
        let allTemplates = [];
        let filteredTemplates = [];

        const CATEGORY_MAP = {
            'cat-001': '人事',
            'cat-002': '経理',
            'cat-003': 'マーケティング',
            'cat-004': '営業',
            'cat-005': '開発',
            'cat-006': 'サポート',
            'cat-007': '法務',
            'cat-008': 'オペレーション',
            'cat-009': '分析',
            'cat-010': 'コミュニケーション'
        };

        const SORT_OPTIONS = {
            'newest': (a, b) => new Date(b.id || 0) - new Date(a.id || 0),
            'popular': (a, b) => (b.usage_count || 0) - (a.usage_count || 0),
            'rating': (a, b) => (b.rating || 0) - (a.rating || 0)
        };

        // ============================================================
        // Initialization
        // ============================================================
        async function init() {
            await loadTemplates();
            setupEventListeners();
            renderTemplates();
        }

        function setupEventListeners() {
            // Search input
            document.getElementById('searchInput').addEventListener('input', (e) => {
                applyFilters();
                updateResultsInfo();
            });

            // Sort select
            document.getElementById('sortSelect').addEventListener('change', (e) => {
                applyFilters();
            });

            // Category tabs
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    applyFilters();
                    updateResultsInfo();
                });
            });
        }

        // ============================================================
        // Data Loading
        // ============================================================
        async function loadTemplates() {
            try {
                const response = await fetch('/api/marketplace/agents?page=1&per_page=100');
                if (!response.ok) throw new Error('Failed to load agents');

                const data = await response.json();
                allTemplates = data.items.map(agent => ({
                    id: agent.id,
                    name: agent.name,
                    description: agent.description,
                    category: agent.category_id,
                    rating: agent.rating || 0,
                    usage_count: agent.installation_count || 0,
                    total_roles: 0,
                    total_processes: 0
                }));

                filteredTemplates = [...allTemplates];
            } catch (error) {
                console.error('Error loading agents:', error);
                document.getElementById('templatesGrid').innerHTML =
                    '<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>エージェントの読み込みに失敗しました</h3><p>もう一度ページを読み込んでください</p></div>';
            }
        }

        // ============================================================
        // Filtering and Sorting
        // ============================================================
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedCategory = document.querySelector('.category-tab.active').dataset.category;
            const sortOption = document.getElementById('sortSelect').value;

            // Filter by search term
            filteredTemplates = allTemplates.filter(template => {
                const matchesSearch =
                    template.name.toLowerCase().includes(searchTerm) ||
                    (template.description && template.description.toLowerCase().includes(searchTerm));

                const matchesCategory =
                    selectedCategory === 'all' ||
                    template.category === selectedCategory;

                return matchesSearch && matchesCategory;
            });

            // Sort
            if (SORT_OPTIONS[sortOption]) {
                filteredTemplates.sort(SORT_OPTIONS[sortOption]);
            }

            renderTemplates();
        }

        function updateResultsInfo() {
            const resultsInfo = document.getElementById('resultsInfo');
            if (filteredTemplates.length === 0) {
                resultsInfo.innerHTML = '';
            } else {
                resultsInfo.innerHTML = `<strong>${filteredTemplates.length}</strong> 件のテンプレートが見つかりました`;
            }
        }

        // ============================================================
        // Rendering
        // ============================================================
        function renderTemplates() {
            const grid = document.getElementById('templatesGrid');
            const emptyState = document.getElementById('emptyState');

            if (filteredTemplates.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            grid.innerHTML = filteredTemplates.map(template => `
                <div class="template-card">
                    <div class="template-header">
                        <div class="template-title">${escapeHtml(template.name)}</div>
                        <div class="template-category">${getCategoryLabel(template.category)}</div>
                    </div>

                    <div class="template-description">
                        ${escapeHtml(template.description || 'テンプレートの説明')}
                    </div>

                    <div class="template-stats">
                        <div class="stat-item">
                            <span class="stat-label">評価</span>
                            <div class="rating">
                                <span class="stars">${renderStars(template.rating)}</span>
                                <span class="rating-count">${template.rating}</span>
                            </div>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">使用件数</span>
                            <span class="stat-value">${template.usage_count || 0}件</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">ロール</span>
                            <span class="stat-value">${template.total_roles || 0}個</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">プロセス</span>
                            <span class="stat-value">${template.total_processes || 0}個</span>
                        </div>
                    </div>

                    <div class="template-action">
                        <button
                            class="btn-template"
                            onclick="selectTemplate(${template.id})"
                        >
                            このテンプレートで組織を作る →
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ============================================================
        // Utility Functions
        // ============================================================
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        function getCategoryLabel(category) {
            return CATEGORY_MAP[category] || category;
        }

        function renderStars(rating) {
            const stars = Math.round(rating);
            return '★'.repeat(stars) + '☆'.repeat(5 - stars);
        }

        // ============================================================
        // Navigation
        // ============================================================
        function selectTemplate(templateId) {
            // Store selected template in sessionStorage
            sessionStorage.setItem('selectedTemplateId', templateId);

            // Navigate to marketplace-detail.html
            window.location.href = `/dashboard/marketplace-detail.html?template_id=${templateId}`;
        }

        // ============================================================
        // Start
        // ============================================================
        document.addEventListener('DOMContentLoaded', init);
    </script>

    <script>
    // Service Worker Registration (PWA Support)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/dashboard/sw.js')
          .then(reg => {
            console.log('[PWA] Service Worker registered successfully:', reg);
            setInterval(() => {
              reg.update().then(() => {
                if (reg.waiting) {
                  console.log('[PWA] New service worker version available');
                  const updateMessage = document.createElement('div');
                  updateMessage.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#3b82f6;color:#fff;padding:12px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;';
                  updateMessage.textContent = '✅ アップデート利用可能。ページをリロードしてください。';
                  document.body.appendChild(updateMessage);
                  setTimeout(() => updateMessage.remove(), 5000);
                }
              });
            }, 24 * 60 * 60 * 1000);
          })
          .catch(err => {
            console.warn('[PWA] Service Worker registration failed:', err);
          });
      });
    }
    </script>
</body>
</html>
